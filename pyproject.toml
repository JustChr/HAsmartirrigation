[tool.ruff]

lint.select = [
  "E",  # pycodestyle
  "F",  # Pyflakes
  "B",  # flake‑bugbear
  "I",  # isort‑style import ordering
  "UP", # pyupgrade
  "SIM" # flake‑simplicity
]

lint.ignore = [
  "E501",  # line‑length
  "SIM102" # nested if statements
]

[tool.pytest.ini_options]
# Single consolidated test tree (was split across tests/, tests/unit/ and
# custom_components/smart_irrigation/tests/ before the consolidation).
testpaths = ["tests"]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --tb=short"
filterwarnings = [
  "ignore::DeprecationWarning",
  "ignore::PendingDeprecationWarning",
]
# Smart Irrigation — enhanced scheduling & Irrigation Unlimited examples
#
# Ready-to-adapt Home Assistant automations for power users. For most needs you
# don't need any of these: create recurring calculate/update/irrigate schedules
# in the panel's **Schedules** tab, and link a switch/valve per zone under
# **Setup → Zones** so the integration runs the valve directly.
#
# These are a YAML list of automations (the `automations.yaml` include format).
# Paste individual entries into the HA automation editor (YAML mode), or append
# them to your automations file. Replace the placeholder entity ids
# (`binary_sensor.rain_sensor`, `switch.irrigation_unlimited_c1_z1`) and the
# example `schedule_id` with your own.
#
# Only services/events that the integration actually provides are used here:
#   services  set_all_multipliers, calculate_all_zones, update_recurring_schedule,
#             sync_with_irrigation_unlimited
#   event     smart_irrigation_irrigation_unlimited_sync_completed

# --- Weather/seasonal multiplier -------------------------------------------
# Set every zone's multiplier based on the current month, then recalculate.
# Replaces the old (removed) seasonal-adjustment service with set_all_multipliers.
- alias: "Smart Irrigation — seasonal multiplier"
  mode: single
  trigger:
    - platform: time
      at: "05:00:00"
  action:
    - variables:
        seasonal_multiplier: >
          {% set m = now().month %}
          {% if m in [3, 4, 5] %}1.2
          {% elif m in [6, 7, 8] %}1.5
          {% elif m in [9, 10, 11] %}0.8
          {% else %}0.3{% endif %}
    - service: smart_irrigation.set_all_multipliers
      data:
        new_multiplier_value: "{{ seasonal_multiplier | float }}"
    - service: smart_irrigation.calculate_all_zones

# --- Rain delay: pause a recurring schedule while it is raining -------------
# `schedule_id` is the numeric id of the schedule you want to pause (the
# Schedules tab lists them).
- alias: "Smart Irrigation — rain delay"
  mode: restart
  trigger:
    - platform: state
      entity_id: binary_sensor.rain_sensor
      to: "on"
  action:
    - service: smart_irrigation.update_recurring_schedule
      data:
        schedule_id: 1
        enabled: false
    - wait_for_trigger:
        - platform: state
          entity_id: binary_sensor.rain_sensor
          to: "off"
          for:
            hours: 2
    - service: smart_irrigation.update_recurring_schedule
      data:
        schedule_id: 1
        enabled: true

# --- Irrigation Unlimited: calculate nightly, then sync durations ----------
- alias: "Smart Irrigation — nightly IU sync"
  mode: single
  trigger:
    - platform: time
      at: "23:30:00"
  action:
    - service: smart_irrigation.calculate_all_zones
    - delay:
        seconds: 30
    - service: smart_irrigation.sync_with_irrigation_unlimited

# --- Irrigation Unlimited: run each synced valve for its calculated duration -
# Fired after a sync completes; iterates the synchronized zones from the event.
- alias: "Smart Irrigation — run IU valves after sync"
  mode: single
  trigger:
    - platform: event
      event_type: smart_irrigation_irrigation_unlimited_sync_completed
  condition:
    - condition: template
      value_template: "{{ trigger.event.data.synchronized_count | int > 0 }}"
  action:
    - repeat:
        for_each: "{{ trigger.event.data.results.synchronized }}"
        sequence:
          - service: switch.turn_on
            target:
              entity_id: "{{ repeat.item.iu_entity }}"
          - delay:
              seconds: "{{ repeat.item.duration | int }}"
          - service: switch.turn_off
            target:
              entity_id: "{{ repeat.item.iu_entity }}"

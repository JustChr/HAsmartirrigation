name: Attach release zip

# Builds custom_components/smart_irrigation into a single smart_irrigation.zip and
# attaches it to a GitHub release. Combined with "zip_release"/"filename" in
# hacs.json, this lets HACS download one zip instead of fetching every file, which
# is faster, more reliable (fewer GitHub API calls), and surfaces a download count.
#
# Manual-only fallback: the primary path is scripts/release.ps1, which builds the
# zip from the tag (git archive) and attaches it AT release creation, so the asset
# is present the moment the release is published without depending on a hosted
# runner. This workflow stays as a manual re-attach tool for older tags or if a
# release was ever created outside release.ps1. Run it with:
#   gh workflow run release-zip.yml --ref master -f tag=<vYYYY.MM.NN>

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to (re)attach the zip to"
        required: true

permissions:
  contents: write

jobs:
  attach-zip:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the released tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - name: Build smart_irrigation.zip
        run: |
          cd custom_components/smart_irrigation
          zip -r smart_irrigation.zip . \
            -x "tests/*" "*/__pycache__/*" "*.pyc" "frontend/node_modules/*"

      - name: Attach the zip to the release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name || inputs.tag }}
          files: custom_components/smart_irrigation/smart_irrigation.zip

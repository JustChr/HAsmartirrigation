name: Build Frontend

# Build-checks the custom panel frontend so TypeScript / lint / bundling
# regressions are caught on PRs. The build had no CI coverage before. This does
# NOT publish the bundle; dist/smart-irrigation.js is still committed (HACS
# installs the repo source tree at the release tag, so it must be present there).

on:
  push:
    branches: [main, master]
    paths:
      - "custom_components/smart_irrigation/frontend/**"
      - ".github/workflows/frontend.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "custom_components/smart_irrigation/frontend/**"
      - ".github/workflows/frontend.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: custom_components/smart_irrigation/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: custom_components/smart_irrigation/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (lint + rollup + babel)
        run: npm run build

      - name: Verify committed bundle is up to date
        # The bundle is committed and shipped in the release tag, so it must
        # match the current source. Fail if a rebuild changes it (i.e. someone
        # edited .ts or bumped the version without rebuilding dist).
        run: |
          if ! git diff --quiet -- dist/smart-irrigation.js dist/smart-irrigation-card.js; then
            echo "::error::A committed dist bundle is out of date - rebuild the frontend and commit the result."
            git --no-pager diff --stat -- dist/smart-irrigation.js dist/smart-irrigation-card.js
            exit 1
          fi
          echo "dist bundles are in sync with source."

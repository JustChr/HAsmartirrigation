blueprint:
  name: "Smart Irrigation: Self-closing valve (entity based)"
  description: >-
    Drives a valve exposed as Home Assistant entities (e.g. a ZHA valve) that
    closes itself via a hardware countdown. Smart Irrigation calls this script
    (service watering mode) with the run duration: it writes the duration to a
    countdown number entity, then turns the valve on. The valve owns the close,
    so an HA restart mid-run cannot cause continuous irrigation.

    A hardware countdown entity is REQUIRED -- without it a plain switch cannot
    self-close; use the Classic watering mode for such a valve instead.

    duration > 0 opens (set countdown, turn on); duration = 0 turns off. The
    same script serves as both the run service and the optional stop service.
    Set the zone's duration unit to match the countdown entity's unit.
  domain: script
  input:
    valve_switch:
      name: Valve switch
      description: The switch/input_boolean that opens the valve.
      selector:
        entity:
          filter:
            - domain: switch
            - domain: input_boolean
    countdown_number:
      name: Hardware countdown entity
      description: >-
        A number entity that sets the valve's auto-off countdown. This is what
        makes the valve self-close.
      selector:
        entity:
          filter:
            - domain: number
mode: single
icon: mdi:sprinkler
fields:
  duration:
    name: Duration
    description: >-
      Run length from Smart Irrigation, in the zone's configured unit (must
      match the countdown entity's unit). 0 closes the valve.
    default: 0
    selector:
      number:
        min: 0
        max: 100000
        mode: box
sequence:
  - variables:
      dur: "{{ duration | int(0) }}"
  - choose:
      - conditions: "{{ dur > 0 }}"
        sequence:
          - action: number.set_value
            target:
              entity_id: !input countdown_number
            data:
              value: "{{ dur }}"
          - action: homeassistant.turn_on
            target:
              entity_id: !input valve_switch
    default:
      - action: homeassistant.turn_off
        target:
          entity_id: !input valve_switch

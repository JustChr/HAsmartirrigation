calculate_all_zones:
  name: Calculate all zones
  description: Calculate irrigation requirements for all zones.
calculate_zone:
  name: Calculate zone
  description: Calculate irrigation requirements for a specific zone.
  target:
    entity:
      domain: sensor
update_all_zones:
  name: Update all zones
  description: Update irrigation settings for all zones.
update_zone:
  name: Update zone
  description: Update irrigation settings for a specific zone.
  target:
    entity:
      domain: sensor
set_bucket:
  name: Set bucket
  description: Set the water bucket value for a specific zone.
  target:
    entity:
      domain: sensor
  fields:
    new_bucket_value:
      required: true
      example: -10
      default: 0
set_all_buckets:
  name: Set all buckets
  description: Set the water bucket value for all zones.
  fields:
    new_bucket_value:
      required: true
      example: -10
      default: 0
reset_bucket:
  name: Reset bucket
  description: Reset the water bucket value for a specific zone.
  target:
    entity:
      domain: sensor
reset_all_buckets:
  name: Reset all buckets
  description: Reset the water bucket value for all zones.
set_all_multipliers:
  name: Set all multipliers
  description: Set the irrigation multiplier value for all zones.
  fields:
    new_multiplier_value:
      required: true
      example: 1.0
      default: 1.0
set_multiplier:
  name: Set multiplier
  description: Set the irrigation multiplier value for a specific zone.
  target:
    entity:
      domain: sensor
  fields:
    new_multiplier_value:
      required: true
      example: 1.0
      default: 1.0
set_zone:
  name: Set zone
  description: Set irrigation parameters for a specific zone.
  target:
    entity:
      domain: sensor
  fields:
    new_bucket_value:
      required: false
      example: -10
      default: 0
    new_multiplier_value:
      required: false
      example: 1.0
      default: 1.0
    new_duration_value:
      required: false
      example: 10
      default: 0
    new_state_value:
      required: false
      example: "automatic"
      default: "automatic"
    new_throughput_value:
      required: false
      example: 50
      default: 50
clear_all_weather_data:
  name: Clear all weather data
  description: Clear all collected weather data from all mappings.
set_state:
  name: Set the state of a zone
  description: Set the state of a zone to a specific value.
  target:
    entity:
      domain: sensor
  fields:
    new_state_value:
      required: true
      example: "automatic"
      default: "automatic"
generate_watering_calendar:
  name: Generate watering calendar
  description: Generate a 12-month watering calendar for irrigation zones based on representative climate data.
  target:
    entity:
      domain: sensor

# Operational controls (WS-5)
set_rain_delay:
  name: Set rain delay
  description: Pause all automatic/scheduled irrigation until a chosen moment (rain delay / vacation hold). Manual runs still work.
  fields:
    until:
      required: false
      example: "2026-07-01 06:00:00"
      description: "Resume automatic irrigation at this date/time."
      selector:
        datetime:
    hours:
      required: false
      example: 24
      description: "Alternatively, pause for this many hours from now."
      selector:
        number:
          min: 1
          max: 720
          unit_of_measurement: h
clear_rain_delay:
  name: Clear rain delay
  description: Resume automatic irrigation by clearing any active rain delay / hold.
run_zone:
  name: Run zone
  description: Water a specific zone for a custom duration (minutes), bypassing the calculation and any active rain delay.
  target:
    entity:
      integration: smart_irrigation
      domain:
        - sensor
        - binary_sensor
        - button
  fields:
    duration:
      required: true
      example: 10
      description: "How long to water, in minutes."
      selector:
        number:
          min: 1
          max: 600
          unit_of_measurement: min

stop_zone:
  name: Stop zone
  description: Stop an in-progress run for a specific zone and turn its valve off.
  target:
    entity:
      integration: smart_irrigation
      domain:
        - sensor
        - binary_sensor
        - button

# Enhanced Scheduling Services
create_recurring_schedule:
  name: Create recurring schedule
  description: Create a new recurring irrigation schedule.
  fields:
    name:
      required: true
      example: "Morning Watering"
      description: "Name of the schedule"
      selector:
        text:
    type:
      required: true
      example: "daily"
      description: "Schedule type (daily, weekly, monthly, interval)"
      selector:
        select:
          options:
            - "daily"
            - "weekly"
            - "monthly"
            - "interval"
    enabled:
      required: false
      example: true
      default: true
      description: "Enable the schedule"
      selector:
        boolean:
    time:
      required: false
      example: "06:00"
      description: "Time to run (HH:MM format)"
      selector:
        time:
    days_of_week:
      required: false
      example: ["monday", "wednesday", "friday"]
      description: "Days of week for weekly schedules"
      selector:
        select:
          options:
            - "monday"
            - "tuesday"
            - "wednesday"
            - "thursday"
            - "friday"
            - "saturday"
            - "sunday"
          multiple: true
    day_of_month:
      required: false
      example: 15
      description: "Day of month for monthly schedules (1-31)"
      selector:
        number:
          min: 1
          max: 31
    interval_hours:
      required: false
      example: 24
      description: "Interval in hours for interval schedules"
      selector:
        number:
          min: 1
          max: 168
    zones:
      required: false
      example: "all"
      description: "Zone IDs to include or 'all'"
      selector:
        text:
    action:
      required: false
      example: "calculate"
      default: "calculate"
      description: "Action to perform (calculate, update, irrigate)"
      selector:
        select:
          options:
            - "calculate"
            - "update"
            - "irrigate"

update_recurring_schedule:
  name: Update recurring schedule
  description: Update an existing recurring irrigation schedule.
  fields:
    schedule_id:
      required: true
      example: "schedule_abc123"
      description: "ID of the schedule to update"
      selector:
        text:
    name:
      required: false
      example: "Evening Watering"
      description: "Name of the schedule"
      selector:
        text:
    enabled:
      required: false
      example: false
      description: "Enable/disable the schedule"
      selector:
        boolean:

delete_recurring_schedule:
  name: Delete recurring schedule
  description: Delete a recurring irrigation schedule.
  fields:
    schedule_id:
      required: true
      example: "schedule_abc123"
      description: "ID of the schedule to delete"
      selector:
        text:

distributor_set_outlet:
  name: Distributor — set current outlet
  description: Re-sync the distributor's outlet position to the value shown in its physical window. Marks the position as synced; you still confirm commissioning separately.
  fields:
    distributor_id:
      required: true
      example: 0
      description: "The distributor id."
      selector:
        number:
          min: 0
          max: 99
          mode: box
    outlet:
      required: true
      example: 1
      description: "The outlet number currently shown in the device window."
      selector:
        number:
          min: 1
          max: 6
          mode: box

distributor_resync_home:
  name: Distributor — re-sync to outlet 1
  description: Convenience re-sync of the distributor position to outlet 1 (after physically advancing the device to 1).
  fields:
    distributor_id:
      required: true
      example: 0
      description: "The distributor id."
      selector:
        number:
          min: 0
          max: 99
          mode: box

distributor_test_run:
  name: Distributor — commissioning test-run
  description: Sweep every outlet for a fixed short window so you can watch each zone water in order and the device advance. Requires a synced position; no watering is credited.
  fields:
    distributor_id:
      required: true
      example: 0
      description: "The distributor id."
      selector:
        number:
          min: 0
          max: 99
          mode: box

distributor_run_now:
  name: Distributor — run one cycle now
  description: Run one full distributor cycle immediately (manual). Requires the distributor to be synced and commissioning-confirmed; rejected if a cycle is already in progress.
  fields:
    distributor_id:
      required: true
      example: 0
      description: "The distributor id."
      selector:
        number:
          min: 0
          max: 99
          mode: box
